<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portofolio Achmad Aulia Akbar</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: white;
}

header {
    text-align: center;
    padding: 60px 20px;
    background: linear-gradient(135deg, #0ea5e9, #6366f1);
}

header h1 {
    margin: 0;
    font-size: 36px;
}

header p {
    margin-top: 10px;
    font-size: 18px;
}

.menu {
    text-align: center;
    margin: 40px 0;
}

.menu button {
    padding: 12px 25px;
    margin: 10px;
    border: none;
    border-radius: 8px;
    background: #22d3ee;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.menu button:hover {
    background: #06b6d4;
    transform: scale(1.05);
}

.section {
    display: none;
    padding: 40px 20px;
    max-width: 1000px;
    margin: auto;
}

.active {
    display: block;
}

.games {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.game-card {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    transition: 0.3s;
    cursor: pointer;
}

.game-card:hover {
    transform: translateY(-10px);
    background: #334155;
}

.game-card img {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 15px;
}

.back-btn {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background: #f43f5e;
    color: white;
    cursor: pointer;
}

.back-btn:hover {
    background: #e11d48;
}
</style>

<script>
function showSection(id) {
    document.querySelectorAll('.section').forEach(sec => {
        sec.classList.remove('active');
    });
    document.getElementById(id).classList.add('active');
}

function goHome() {
    document.querySelectorAll('.section').forEach(sec => {
        sec.classList.remove('active');
    });
}
</script>

</head>
<body>

<header>
    <h1>Selamat Datang di Portofolio</h1>
    <p>Achmad Aulia Akbar</p>
</header>

<div class="menu">
    <button onclick="showSection('cv')">CV</button>
    <button onclick="showSection('games')">Project Game</button>
</div>

<!-- CV SECTION -->
<div id="cv" class="section">
    <h2>Curriculum Vitae</h2>
    <p>Isi CV kamu di sini atau upload dalam bentuk PDF.</p>

    <!-- Jika mau tampil PDF -->
    <!--
    <iframe src="cv.pdf" width="100%" height="500px"></iframe>
    -->

    <button class="back-btn" onclick="goHome()">Kembali</button>
</div>

<!-- GAME SECTION -->
<div id="games" class="section">
    <h2>Project Game</h2>

    <div class="games">

        <!-- GAME 1 -->
        <div class="game-card" onclick="window.open('https://achmadakbar.itch.io/learn-jump', '_blank')">
            <img src="gambargame1.png/400x200" alt="Game 1">
            <h3>Judul Game 1</h3>
            <p>Klik untuk download di itch.io</p>
        </div>

        <!-- GAME 2 -->
        <div class="game-card" onclick="window.open('https://meritroia.itch.io/gala-flare-of-bravery', '_blank')">
            <img src="gambargame2.png/400x200" alt="Game 2">
            <h3>Judul Game 2</h3>
            <p>Klik untuk download di itch.io</p>
        </div>

    </div>

    <button class="back-btn" onclick="goHome()">Kembali</button>
</div>

</body>
</html>
